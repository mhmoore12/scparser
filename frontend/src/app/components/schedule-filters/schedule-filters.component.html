<section class="filters-grid">
  <mat-form-field appearance="outline">
    <mat-label>Search</mat-label>
    <input
      matInput
      [value]="filters.query"
      (input)="update('query', $any($event.target).value)"
      placeholder="Drop in, public skate, rink, activity id"
    />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Rinks</mat-label>
    <mat-select
      multiple
      [value]="filters.rinks"
      (valueChange)="update('rinks', $event)"
    >
      @for (rink of rinks; track rink) {
        <mat-option [value]="rink">{{ rink }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Date</mat-label>
    <input
      matInput
      type="date"
      [value]="filters.date"
      (input)="update('date', $any($event.target).value)"
    />
  </mat-form-field>

  <mat-slide-toggle
    [checked]="filters.availableOnly"
    (change)="update('availableOnly', $event.checked)"
  >
    Available slots only
  </mat-slide-toggle>
</section>
